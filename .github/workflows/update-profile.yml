name: Fetch and Save GitHub Profile

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch and Compare updated_at
        id: check_update
        run: |
          if [ -f profile.json ]; then
            OLD_TIME=$(jq -r '.updated_at' profile.json)
          else
            OLD_TIME="none"
          fi

          curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               https://api.github.com/users/${{ github.repository_owner }} > temp.json
          
          NEW_TIME=$(jq -r '.updated_at' temp.json)

          if [ "$OLD_TIME" != "$NEW_TIME" ]; then
            echo "✨ Update detected! Changed from $OLD_TIME to $NEW_TIME"
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "timestamp=$NEW_TIME" >> $GITHUB_OUTPUT
            
            jq '.' temp.json > profile.json
            rm temp.json
          else
            echo "💤 No changes detected ($OLD_TIME). Skipping update."
            echo "updated=false" >> $GITHUB_OUTPUT
            rm temp.json
          fi

      - name: Generate Release Tag
        if: steps.check_update.outputs.updated == 'true'
        id: tag
        run: |
          TAG=$(date +'%Y.%m.%d.%H%M%S')
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Push to data branch
        if: steps.check_update.outputs.updated == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout data 2>/dev/null || (git checkout --orphan data && git rm -rf .)
          git checkout main -- profile.json 2>/dev/null || git checkout master -- profile.json
          git add profile.json
          git commit -m "chore: update profile data (${{ steps.check_update.outputs.timestamp }})" || true
          git push -u origin data

      - name: Create Release
        if: steps.check_update.outputs.updated == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Profile Update - ${{ steps.tag.outputs.release_tag }}"
          body: |
            Profile data updated at: `${{ steps.check_update.outputs.timestamp }}`
            
            **jsDelivr CDN URLs:**
            
            Latest version (data branch - recommended):
            ```
            https://cdn.jsdelivr.net/gh/${{ github.repository }}@data/profile.json
            ```
            
            Specific version:
            ```
            https://cdn.jsdelivr.net/gh/${{ github.repository }}@${{ steps.tag.outputs.release_tag }}/profile.json
            ```
          files: profile.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
